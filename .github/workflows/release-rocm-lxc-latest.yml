name: Release ROCm LXC Template (Latest)

on:
  workflow_run:
    workflows: [Build ROCm LXC Template]
    types: [completed]

permissions:
  contents: write
  actions: read

jobs:
  release_latest:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-24.04

    steps:
      - name: Download artifacts from triggering run
        uses: actions/download-artifact@v4
        with:
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: release-artifacts

      - name: Prepare release assets (split large files)
        shell: bash
        run: |
          set -euo pipefail
          MAX_BYTES=2147483647
          SPLIT_SIZE="1900m"

          mkdir -p release-assets

          while IFS= read -r -d '' file; do
            name="$(basename "$file")"
            size="$(stat -c%s "$file")"

            if [[ "$name" == *.tar.gz ]] && (( size > MAX_BYTES )); then
              echo "Splitting oversized asset: $name (${size} bytes)"
              split -b "$SPLIT_SIZE" -d -a 3 --additional-suffix=.part "$file" "release-assets/${name}."
              sha256sum release-assets/${name}.*.part > "release-assets/${name}.parts.sha256"
              {
                echo "This template was split for GitHub Release upload (2GB per-asset limit)."
                echo ""
                echo "Reassemble with:"
                echo "cat ${name}.*.part > ${name}"
              } > "release-assets/${name}.parts.README.txt"
            else
              cp "$file" "release-assets/$name"
            fi
          done < <(find release-artifacts -type f -print0)

      - name: Publish moving latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: lxc-template-latest
          name: ROCm LXC Template (latest)
          target_commitish: ${{ github.event.workflow_run.head_sha }}
          make_latest: true
          generate_release_notes: false
          body: |
            Rolling latest release for the most recent successful template build.

            Source workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}
          files: |
            release-assets/*
